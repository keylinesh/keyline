# Keyline CI — runs on every merge request and on main.
# Skeleton pipeline; stages fail the build on any error.

default:
  image: node:20

stages:
  - install
  - build
  - verify
  - release

variables:
  PNPM_HOME: "$CI_PROJECT_DIR/.pnpm"

cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store/
    - node_modules/

.setup: &setup
  before_script:
    - corepack enable
    - corepack prepare pnpm@9.0.0 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile

install:
  stage: install
  <<: *setup
  script:
    - echo "dependencies installed"

# Build internal packages first; their dist/ output (and type declarations) is
# what the workspace packages import. Later stages consume these as artifacts,
# so typecheck and test can resolve @keyline/* without rebuilding.
build:
  stage: build
  <<: *setup
  script:
    - pnpm build
  artifacts:
    paths:
      - "packages/*/dist"
      - "apps/*/dist"
    expire_in: 1 hour

lint:
  stage: verify
  <<: *setup
  script:
    - pnpm lint

typecheck:
  stage: verify
  <<: *setup
  script:
    - pnpm typecheck

test:
  stage: verify
  <<: *setup
  script:
    - pnpm test

# Integration tests against a real Postgres (catches transactional/SQL issues
# the in-memory repos can't, e.g. FOR UPDATE semantics). DATABASE_URL points at
# the service; sslmode=disable since the throwaway service has no TLS.
pg-test:
  stage: verify
  <<: *setup
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_DB: keyline_test
    POSTGRES_USER: keyline
    POSTGRES_PASSWORD: keyline
    DATABASE_URL: "postgres://keyline:keyline@postgres:5432/keyline_test?sslmode=disable"
  script:
    - pnpm --filter @keyline/api db:migrate
    - pnpm --filter @keyline/api exec node --import tsx --test src/domain/pg-repo.pg.test.ts

# End-to-end (#56): the real bundled CLI as a child process against the real
# API server over real HTTP — signup, link, push/pull, webhook plan flip,
# invite/join on a second HOME, grant, revoke lockout, audit verify.
e2e:
  stage: verify
  <<: *setup
  script:
    - pnpm build
    - pnpm --filter @keylinesh/cli bundle
    - node --test e2e/cli.e2e.test.mjs

# Load test (#56): pull/push/webhook paths under concurrency, in-memory
# storage. Budget: zero non-2xx, p99 <= 250ms. Scheduled weekly with
# dep-audit; start manually from the Pipelines UI for an ad-hoc run.
load-test:
  stage: verify
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
      allow_failure: true
  <<: *setup
  script:
    - pnpm build
    - pnpm --filter @keylinesh/cli bundle
    - node scripts/load-test.mjs

# Mirror to GitHub (public home for stars/trust; GitLab stays the dev
# machine). Runs on every main pipeline; needs the GITHUB_MIRROR_TOKEN CI
# variable (fine-grained, Contents read/write on the keylinesh org). Also
# refreshes the Homebrew tap mirror from its GitLab source of truth.
mirror-github:
  stage: verify
  variables:
    GIT_DEPTH: "0" # full clone: a shallow history cannot be pushed to an empty mirror
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $GITHUB_MIRROR_TOKEN'
  <<: *setup
  script:
    - git push --force "https://x-access-token:${GITHUB_MIRROR_TOKEN}@github.com/keylinesh/keyline.git" "HEAD:refs/heads/main"
    - git push --force --tags "https://x-access-token:${GITHUB_MIRROR_TOKEN}@github.com/keylinesh/keyline.git"
    - git clone --quiet https://gitlab.com/resim.boyadzhiev/homebrew-keyline.git /tmp/tap
    - git -C /tmp/tap push --force "https://x-access-token:${GITHUB_MIRROR_TOKEN}@github.com/keylinesh/homebrew-keyline.git" "HEAD:refs/heads/main"

# Dependency audit (SOC 2 readiness, CC7 in docs/compliance/gap-assessment.md).
# Runs on scheduled pipelines (weekly schedule set in GitLab UI) and can be
# started by hand. Gates on production dependencies; dev-chain advisories
# (@vercel/node build tooling) are tracked in the gap assessment instead.
dep-audit:
  stage: verify
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
      allow_failure: true
  <<: *setup
  script:
    - pnpm audit --prod --audit-level moderate

# ---- Release (#37) ----------------------------------------------------------
# Runs only on version tags (vX.Y.Z). Publishes the single-file CLI to npm and
# creates a GitLab release with SHA-256 checksums attached. Requires the
# NPM_TOKEN CI/CD variable (npm automation token) — see docs/distribution.md.
publish-npm:
  stage: release
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  <<: *setup
  script:
    - pnpm build
    - pnpm --filter @keylinesh/cli bundle
    - cd apps/cli
    # The tag must match the package version, or refuse to publish.
    - test "v$(node -p "require('./package.json').version")" = "$CI_COMMIT_TAG"
    - npm pack
    - sha256sum ./*.tgz dist/keyline.js > SHA256SUMS
    - cat SHA256SUMS
    - npm config set "//registry.npmjs.org/:_authToken" "$NPM_TOKEN"
    - npm publish ./*.tgz --access public
  artifacts:
    paths:
      - apps/cli/SHA256SUMS
      - apps/cli/*.tgz
    expire_in: never

# Native single-file executables (#67): linux-x64/arm64 + win-x64, unsigned,
# checksums attached. macOS waits for an Apple Developer certificate
# (Gatekeeper makes unsigned Mac binaries useless); signing hooks live in
# apps/cli/build-sea.mjs.
build-binaries:
  stage: release
  needs: ["publish-npm"]
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  <<: *setup
  script:
    - apt-get update -qq && apt-get install -y -qq unzip
    - pnpm build
    - cd apps/cli
    - node build-sea.mjs
    - cat dist-bin/SHA256SUMS
  artifacts:
    paths:
      - apps/cli/dist-bin/
    expire_in: never

gitlab-release:
  stage: release
  needs: ["publish-npm"]
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - echo "creating release for $CI_COMMIT_TAG"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "keyline $CI_COMMIT_TAG"
    description: |
      Install: `curl -fsSL keyline.sh/install | sh` or `npm i -g @keylinesh/cli`.

      SHA-256 checksums for this release are in the publish-npm job's
      SHA256SUMS artifact. Native binaries (linux-x64, linux-arm64,
      win-x64; unsigned, #67) are in the build-binaries job's artifacts
      with their own SHA256SUMS.
